name: Download and Release Linux Itch.io Game

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag (optional)"
        required: false
        type: string # Allows manual trigger from the Actions tab
  push:
    tags:
      - 'V*' # Triggers automatically when you push a tag starting with 'v' (e.g., v1.0.0)
permissions:
  contents: write

jobs:
  build_and_package:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Determine Repository Name
        id: repo
        shell: bash
        run: |
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          echo "name=$REPO_NAME" >> "$GITHUB_OUTPUT"

      - name: Download, Scan, and Package Game
        id: package
        env:
          # Change these variables to point to your exact target game URL
          ITCH_USER: "garula"
          ITCH_GAME: "the-freak-circus"
        run: |
          # 1. Install itchio-downloader globally
          npm install -g itchio-downloader
          
          # 2. Extract repository name dynamically
          REPO_NAME=$(echo "${{ github.repository }}" | cut -d'/' -f2)
          echo "Target Directory Name: $REPO_NAME"
          
          # 3. Establish workspace directories
          mkdir -p game-temp
          mkdir -p "$REPO_NAME"
          cd "$REPO_NAME"
          cd ..
          # 4. Download files from itch.io
          npx itchio-downloader download --author "$ITCH_USER" --name "$ITCH_GAME" --platform linux --downloadDirectory ./"$REPO_NAME"
          # 5. Extract zipped payloads if the downloader left them archived
          cd "$REPO_NAME"
          find . -maxdepth 3 -type f \( -name "*.zip" -o -name "*.tar.gz" -o -name "*.tgz" \) | while read -r archive; do
            echo "Extracting nested archive: $archive"
            if [[ "$archive" == *.zip ]]; then
              tar -xvf "$archive" && rm "$archive"
            else
              tar -xvf "$archive" && rm "$archive"
            fi
          done
          mv Mindustry Mindustry.x86_64 || true
          mv Mindustry.json Mindustry.x86_64.json || true
          # 7. AUTOMATED BINARY DETECTION SCAN
          echo "Scanning for Linux binaries..."
          TARGET_BINARY=""
          cd ..
          # Priority 1: Check standard Linux file extensions or common game engines (Godot/Unity/Love2D)
          FOUND_FILE=$(find ./"$REPO_NAME" -type f \( -name "*.x86_64" -o -name "*.x86" -o -name "*.bin" -o -name "*.appimage" -o -name "linux-wrapper" -o -name "*.py" \) -print -quit)
          
          # Priority 2: Fallback to inspecting file headers via 'file' utility for native Linux ELF binaries
          if [ -z "$FOUND_FILE" ]; then
            echo "No explicit extensions found. Inspecting binary markers..."
            FOUND_FILE=$(find ./"$REPO_NAME" -type f -not -name "*.*" -executable -exec sh -c 'file -b "$1" | grep -q "ELF"' _ {} \; -print -quit)
          fi


          
          # Isolate relative path inside the directory
          if [ -n "$FOUND_FILE" ]; then
            TARGET_BINARY=$(echo "$FOUND_FILE" | sed "s|^\./$REPO_NAME/||")
            echo "SUCCESS: Found candidate Linux executable: $TARGET_BINARY"
          else
            echo "WARNING: No clear Linux binary discovered. Creating generic script."
            TARGET_BINARY="replace_with_your_actual_binary"
          fi
          
          # 8. Generate the dynamic launch script
          SCRIPT_NAME="run_${REPO_NAME}.sh"
          LAUNCH_PATH="./${REPO_NAME}/${SCRIPT_NAME}"
          
          echo '#!/bin/bash' > "$LAUNCH_PATH"
          echo '# Navigate to the script directory to resolve relative file dependencies' >> "$LAUNCH_PATH"
          echo 'cd "$(dirname "$0")"' >> "$LAUNCH_PATH"
          echo '' >> "$LAUNCH_PATH"
          echo "echo \"Launching ${REPO_NAME}...\"" >> "$LAUNCH_PATH"

          if [[ "$FOUND_FILE" == *.py ]]; then
            echo "python3 \"./$TARGET_BINARY\" \"\$@\"" >> "$LAUNCH_PATH"
          else
            echo "\"./$TARGET_BINARY\" \"\$@\"" >> "$LAUNCH_PATH"
            # Add your actions here
          fi
          

          # It's not Python: write the normal execution string

          
          # 9. Set permissions across the directory bundle
          chmod +x "$LAUNCH_PATH"
          if [ "$TARGET_BINARY" != "replace_with_your_actual_binary" ]; then
            chmod +x ./"$REPO_NAME"/"$TARGET_BINARY"
          fi
          echo $PWD
          ls --all
          # 10. Archive the directory structure to a tar.xz bundle
          PACKAGE_NAME="${{ steps.repo.outputs.name }}.tar.xz"
          echo "Archiving to $PACKAGE_NAME..."
          tar \
            --sort=name \
            --mtime='UTC 2025-01-01' \
            --owner=0 \
            --group=0 \
            --numeric-owner \
            -cJvf "$PACKAGE_NAME" \
            -C $REPO_NAME .

          echo "tarname=$PACKAGE_NAME" >> "$GITHUB_OUTPUT"

          echo "Created $PACKAGE_NAME"
          

      # Keep artifact upload as a backup safety net
      - name: Verify Tarball Exists
        run: |
          PACKAGE_NAME="${{ steps.package.outputs.tarname }}"
          if [ -f "$PACKAGE_NAME" ]; then
            echo "✓ Tarball found: $PACKAGE_NAME"
            ls -lh "$PACKAGE_NAME"
          else
            echo "✗ Tarball not found: $PACKAGE_NAME"
            exit 1
          fi

      - name: Upload Tarball Artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-game-archive
          path: ${{ steps.package.outputs.tarname }}

  release:
    needs: build_and_package
    runs-on: ubuntu-latest
    permissions:
      contents: write # Crucial permission flag required to publish GitHub Releases
    
    steps:
      - name: Download Packaged Game
        uses: actions/download-artifact@v4
        with:
          name: linux-game-archive

      - name: Determine Repository Name
        id: repo
        shell: bash
        run: |
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          echo "name=$REPO_NAME" >> "$GITHUB_OUTPUT"

      - name: Determine Release Tag
        id: tag
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.release_tag }}" ]; then
            TAG="${{ github.event.inputs.release_tag }}"
          else
            TAG="build-$(date -u +'%Y%m%d-%H%M%S')"
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          PACKAGE_NAME="${{ steps.repo.outputs.name }}.tar.xz"
          echo "tarname=$PACKAGE_NAME" >> "$GITHUB_OUTPUT"


      - name: Create GitHub Release and Upload Asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.repo.outputs.name }} ${{ steps.tag.outputs.tag }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: ${{ steps.tag.outputs.tarname }}
